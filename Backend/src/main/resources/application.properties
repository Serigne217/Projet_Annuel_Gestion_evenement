# --- Configuration de la base de données ---
# Ajout de useSSL=false et allowPublicKeyRetrieval pour éviter le timeout
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/projet_annuel_m1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Configuration JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Optionnel : aide Hibernate à mieux comprendre le dialecte MySQL de XAMPP
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Stratégie de nommage (StandardImpl garde les noms exacts de tes entités Java)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- Port de l'application Backend ---
server.port=8090